name: Mindy Monday Kickoff Report
on:
  schedule:
    - cron: '0 14 * * 1'   # Monday 14:00 UTC = 08:00 CST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Slack post, no vault commit)'
        type: boolean
        default: false

permissions:
  contents: write

defaults:
  run:
    working-directory: agentic-systems/mindy

jobs:
  monday-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agentic-systems/mindy/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: test
          LINEAR_API_KEY: test
          FIREFLIES_API_KEY: test
          GITHUB_TOKEN: test
          SLACK_BOT_TOKEN: test
          NOTION_TOKEN: test
          SLACK_CHANNEL_ID: test

      - name: Run Monday orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SLACK_CHANNEL_ID: C0AB0GUBX3K
          REPORT_TYPE: monday
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/orchestrator.py

      - name: Commit vault updates
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: .
        run: |
          git config user.name "mindy[bot]"
          git config user.email "mindy-bot@uplabs.us"
          git add agentic-systems/mindy/vault/
          git diff --staged --quiet || git commit -m "vault: monday sync $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Notify Slack on failure
        if: failure()
        working-directory: .
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"C0AB0GUBX3K\", \"text\": \"⚠️ *Mindy Monday report failed*\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nPlease check the logs.\"}"
