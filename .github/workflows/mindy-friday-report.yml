name: Mindy Friday Wrap-Up Report
on:
  schedule:
    - cron: '0 21 * * 5'   # Friday 21:00 UTC = 15:00 CST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Slack post, no vault commit)'
        type: boolean
        default: false

permissions:
  contents: write

defaults:
  run:
    working-directory: agentic-systems/mindy

jobs:
  friday-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agentic-systems/mindy/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: test
          LINEAR_API_KEY: test
          FIREFLIES_API_KEY: test
          GITHUB_TOKEN: test
          SLACK_BOT_TOKEN: test
          NOTION_TOKEN: test
          SLACK_CHANNEL_ID: test

      - name: Run Friday orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          REPORT_TYPE: friday
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/orchestrator.py

      - name: Commit vault updates
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: .
        run: |
          git config user.name "mindy[bot]"
          git config user.email "mindy-bot@uplabs.us"
          git add agentic-systems/mindy/vault/
          git diff --staged --quiet || git commit -m "vault: friday sync $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Notify Slack on failure
        if: failure()
        working-directory: .
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"$SLACK_CHANNEL_ID\", \"text\": \"⚠️ *Mindy Friday report failed*\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nPlease check the logs.\"}"
